<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="18" fill="#080808"/>
  <!-- Shield body fill -->
  <path d="M50 10 L16 24 L16 50 C16 70 31 85 50 92 C69 85 84 70 84 50 L84 24 Z"
        fill="rgba(0,255,65,0.12)"/>
  <!-- Shield outline with glow -->
  <path d="M50 10 L16 24 L16 50 C16 70 31 85 50 92 C69 85 84 70 84 50 L84 24 Z"
        fill="none" stroke="#00ff41" stroke-width="3.5" stroke-linejoin="round"
        filter="url(#glow)"/>
  <!-- PF monogram -->
  <text x="50" y="63"
        text-anchor="middle"
        fill="#00ff41"
        font-size="30"
        font-weight="900"
        font-family="'Courier New', monospace"
        letter-spacing="-1"
        filter="url(#glow)">PF</text>
  <!-- Corner brackets (top-left) -->
  <path d="M6 6 L6 16 M6 6 L16 6" stroke="#00ff41" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <!-- Corner brackets (top-right) -->
  <path d="M94 6 L94 16 M94 6 L84 6" stroke="#00ff41" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <!-- Corner brackets (bottom-left) -->
  <path d="M6 94 L6 84 M6 94 L16 94" stroke="#00ff41" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <!-- Corner brackets (bottom-right) -->
  <path d="M94 94 L94 84 M94 94 L84 94" stroke="#00ff41" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
</svg>
